<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Estif Bingo - Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a472a 0%, #0d2e1e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 20px;
            color: #f5efdc;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        /* Header */
        .header {
            background: rgba(15, 62, 42, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #f5c542;
        }
        
        .balance-card {
            text-align: center;
            background: #2a5a3e;
            padding: 8px 16px;
            border-radius: 20px;
        }
        
        .balance-label {
            font-size: 12px;
            opacity: 0.8;
        }
        
        .balance-amount {
            font-size: 24px;
            font-weight: bold;
            color: #f5c542;
        }
        
        /* Game Display */
        .game-display {
            background: rgba(15, 62, 42, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .round-badge {
            background: #f5c542;
            color: #1a472a;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 15px;
        }
        
        .timer {
            font-size: 48px;
            font-family: monospace;
            font-weight: bold;
            color: #f5c542;
            margin: 10px 0;
        }
        
        .timer.urgent {
            color: #ff4444;
            animation: pulse 0.5s infinite;
        }
        
        .status-badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
        }
        
        .status-badge.selection { background: #2196f3; }
        .status-badge.active { background: #4caf50; }
        .status-badge.ended { background: #9c27b0; }
        
        .called-numbers {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 15px;
            max-height: 150px;
            overflow-y: auto;
        }
        
        .called-ball {
            background: #f5c542;
            color: #1a472a;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            animation: popIn 0.3s ease-out;
        }
        
        /* Cartela Grid */
        .cartela-section {
            background: rgba(15, 62, 42, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
        }
        
        .section-title {
            text-align: center;
            margin-bottom: 15px;
        }
        
        .section-title h3 {
            color: #f5c542;
        }
        
        .selection-stats {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
        }
        
        .cartela-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 8px;
            max-height: 400px;
            overflow-y: auto;
            padding: 5px;
        }
        
        .cartela-item {
            background: #2a5a3e;
            text-align: center;
            padding: 10px 5px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.2s;
        }
        
        .cartela-item:hover {
            transform: scale(1.05);
            background: #f5c542;
            color: #1a472a;
        }
        
        .cartela-item.selected {
            background: #f5c542;
            color: #1a472a;
            box-shadow: 0 0 0 2px #ff9800;
        }
        
        .cartela-item.disabled {
            opacity: 0.4;
            pointer-events: none;
        }
        
        /* Selected Cartelas */
        .selected-cartelas {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        
        .selected-card {
            background: #2a5a3e;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            min-width: 120px;
            position: relative;
        }
        
        .selected-number {
            font-size: 28px;
            font-weight: bold;
            color: #f5c542;
        }
        
        .remove-btn {
            position: absolute;
            top: -10px;
            right: -10px;
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            cursor: pointer;
        }
        
        /* Winner Announcement */
        .winner-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.3s;
        }
        
        .winner-card {
            background: linear-gradient(135deg, #f5c542, #ff9800);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            color: #1a472a;
        }
        
        .winner-title {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        
        .winner-reward {
            font-size: 28px;
            font-weight: bold;
            margin: 15px 0;
        }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            border-radius: 30px;
            background: #333;
            color: white;
            z-index: 1000;
            animation: slideUp 0.3s;
        }
        
        .toast.success { background: #4caf50; }
        .toast.error { background: #f44336; }
        .toast.warning { background: #ff9800; }
        
        .footer {
            text-align: center;
            padding: 20px;
            font-size: 12px;
            opacity: 0.7;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        
        @keyframes popIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        @media (max-width: 600px) {
            .cartela-grid { grid-template-columns: repeat(6, 1fr); gap: 5px; }
            .cartela-item { font-size: 12px; padding: 8px 3px; }
            .timer { font-size: 36px; }
            .called-ball { width: 35px; height: 35px; font-size: 14px; }
            .winner-title { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🎲 Estif Bingo</div>
            <div class="balance-card">
                <div class="balance-label">💰 BALANCE</div>
                <div class="balance-amount" id="balanceAmount">0</div>
                <span>ETB</span>
            </div>
        </div>
        
        <div class="game-display">
            <div class="round-badge" id="roundDisplay">Round --</div>
            <div class="timer" id="timerDisplay">--:--</div>
            <div class="status-badge selection" id="statusDisplay">Select Cartelas</div>
            <div class="called-numbers" id="calledNumbers"></div>
        </div>
        
        <div class="cartela-section" id="cartelaSection">
            <div class="section-title">
                <h3>🎲 SELECT YOUR CARTELAS</h3>
                <p>Max 2 cartelas | 10 ETB each</p>
            </div>
            <div class="selection-stats">
                <span>Selected: <strong id="selectedCount">0/2</strong></span>
                <span>Balance: <strong id="balanceDisplay">0</strong> ETB</span>
            </div>
            <div class="cartela-grid" id="cartelaGrid"></div>
        </div>
        
        <div class="cartela-section" id="selectedSection" style="display: none;">
            <div class="section-title">
                <h3>🎯 YOUR SELECTED CARTELAS</h3>
                <p>Waiting for numbers to be called!</p>
            </div>
            <div class="selected-cartelas" id="selectedCartelasList"></div>
        </div>
        
        <div class="footer">
            <p>Estif Bingo © 2024 | 24/7 Continuous Gameplay</p>
        </div>
    </div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script>
        // Game state
        let socket = null;
        let gameState = { status: 'selection', round: 0, timer: 50, drawnNumbers: [] };
        let playerState = { balance: 0, selectedCartelas: [], username: '' };
        let cartelaElements = [];
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            initializeSocket();
            createCartelaGrid();
        });
        
        function initializeSocket() {
            socket = io();
            
            socket.on('connect', () => {
                console.log('Connected to server');
                socket.emit('register', {});
            });
            
            socket.on('registered', (data) => {
                playerState.balance = data.balance;
                playerState.username = data.username;
                updateBalanceDisplay();
                
                if (data.gameState) {
                    gameState = data.gameState;
                    updateGameDisplay();
                }
            });
            
            socket.on('gameState', (state) => {
                gameState = state;
                updateGameDisplay();
            });
            
            socket.on('timerUpdate', (data) => {
                gameState.timer = data.seconds;
                updateTimerDisplay(data.seconds);
                
                if (data.seconds <= 10) {
                    document.getElementById('timerDisplay').classList.add('urgent');
                } else {
                    document.getElementById('timerDisplay').classList.remove('urgent');
                }
            });
            
            socket.on('gameStarted', (data) => {
                gameState.status = 'active';
                updateGameDisplay();
                showToast(`Game started! Round ${data.round}`, 'success');
                showCartelaSelection(false);
            });
            
            socket.on('numberDrawn', (data) => {
                addCalledNumber(data.number);
                playSound(data.number);
            });
            
            socket.on('selectionConfirmed', (data) => {
                playerState.balance = data.balance;
                playerState.selectedCartelas.push(data.cartela);
                updateBalanceDisplay();
                updateSelectedCount(playerState.selectedCartelas.length);
                showToast(data.message, 'success');
                updateCartelaHighlight(data.cartela, true);
            });
            
            socket.on('selectionUpdated', (data) => {
                playerState.selectedCartelas = data.selectedCartelas;
                playerState.balance = data.balance;
                updateBalanceDisplay();
                updateSelectedDisplay();
                refreshCartelaHighlights();
            });
            
            socket.on('roundEnded', (data) => {
                showWinnerAnnouncement(data);
                playWinSound();
                playerState.selectedCartelas = [];
                updateSelectedDisplay();
                refreshCartelaHighlights();
                gameState.status = 'ended';
                updateGameDisplay();
            });
            
            socket.on('nextRound', (data) => {
                gameState.round = data.round;
                gameState.timer = data.timer;
                gameState.status = 'selection';
                gameState.drawnNumbers = [];
                updateGameDisplay();
                showCartelaSelection(true);
                showToast(data.message, 'info');
                document.getElementById('calledNumbers').innerHTML = '';
            });
            
            socket.on('error', (message) => {
                showToast(message, 'error');
            });
        }
        
        function createCartelaGrid() {
            const grid = document.getElementById('cartelaGrid');
            grid.innerHTML = '';
            cartelaElements = [];
            
            for (let i = 1; i <= 400; i++) {
                const cell = document.createElement('div');
                cell.className = 'cartela-item';
                cell.textContent = i;
                cell.dataset.number = i;
                cell.onclick = () => selectCartela(i);
                grid.appendChild(cell);
                cartelaElements.push(cell);
            }
        }
        
        function selectCartela(number) {
            if (gameState.status !== 'selection') {
                showToast('Cannot select now. Game already started!', 'error');
                return;
            }
            
            if (playerState.selectedCartelas.includes(number)) {
                socket.emit('deselectCartela', { cartelaNumber: number });
            } else {
                if (playerState.selectedCartelas.length >= 2) {
                    showToast('Maximum 2 cartelas allowed!', 'error');
                    return;
                }
                socket.emit('selectCartela', { cartelaNumber: number });
            }
        }
        
        function updateCartelaHighlight(number, isSelected) {
            const cell = cartelaElements.find(c => parseInt(c.dataset.number) === number);
            if (cell) {
                if (isSelected) cell.classList.add('selected');
                else cell.classList.remove('selected');
            }
        }
        
        function refreshCartelaHighlights() {
            cartelaElements.forEach(cell => {
                const num = parseInt(cell.dataset.number);
                if (playerState.selectedCartelas.includes(num)) {
                    cell.classList.add('selected');
                } else {
                    cell.classList.remove('selected');
                }
            });
        }
        
        function updateSelectedDisplay() {
            const container = document.getElementById('selectedCartelasList');
            if (!container) return;
            
            if (playerState.selectedCartelas.length === 0) {
                container.innerHTML = '<div style="text-align:center; opacity:0.7;">No cartelas selected</div>';
                return;
            }
            
            container.innerHTML = '';
            playerState.selectedCartelas.forEach(cartela => {
                const card = document.createElement('div');
                card.className = 'selected-card';
                card.innerHTML = `
                    <div class="selected-number">#${cartela}</div>
                    <button class="remove-btn" onclick="deselectCartela(${cartela})">✗</button>
                `;
                container.appendChild(card);
            });
        }
        
        function deselectCartela(number) {
            if (gameState.status !== 'selection') {
                showToast('Cannot deselect now', 'error');
                return;
            }
            socket.emit('deselectCartela', { cartelaNumber: number });
        }
        
        function updateGameDisplay() {
            const roundEl = document.getElementById('roundDisplay');
            const statusEl = document.getElementById('statusDisplay');
            const cartelaSection = document.getElementById('cartelaSection');
            const selectedSection = document.getElementById('selectedSection');
            
            if (roundEl) roundEl.textContent = `Round ${gameState.round}`;
            if (statusEl) {
                statusEl.textContent = gameState.status === 'selection' ? '🎲 SELECT CARTELAS' : 
                                       gameState.status === 'active' ? '🎯 GAME IN PROGRESS' : '🏆 ROUND ENDED';
                statusEl.className = `status-badge ${gameState.status}`;
            }
            
            updateTimerDisplay(gameState.timer);
            updateCalledNumbers(gameState.drawnNumbers);
            
            if (gameState.status === 'selection') {
                cartelaSection.style.display = 'block';
                selectedSection.style.display = 'none';
                enableCartelaSelection(true);
            } else if (gameState.status === 'active') {
                cartelaSection.style.display = 'none';
                selectedSection.style.display = 'block';
                updateSelectedDisplay();
                enableCartelaSelection(false);
            } else {
                cartelaSection.style.display = 'block';
                selectedSection.style.display = 'none';
                enableCartelaSelection(false);
            }
        }
        
        function updateTimerDisplay(seconds) {
            const timerEl = document.getElementById('timerDisplay');
            if (!timerEl) return;
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            timerEl.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }
        
        function updateCalledNumbers(numbers) {
            const container = document.getElementById('calledNumbers');
            if (!container) return;
            container.innerHTML = '';
            numbers.forEach(number => {
                const ball = document.createElement('div');
                ball.className = 'called-ball';
                ball.textContent = number;
                container.appendChild(ball);
            });
        }
        
        function addCalledNumber(number) {
            const container = document.getElementById('calledNumbers');
            const ball = document.createElement('div');
            ball.className = 'called-ball';
            ball.textContent = number;
            container.appendChild(ball);
            container.scrollTop = container.scrollHeight;
            
            while (container.children.length > 30) {
                container.removeChild(container.firstChild);
            }
        }
        
        function updateBalanceDisplay() {
            const balanceEl = document.getElementById('balanceAmount');
            const balanceDisplay = document.getElementById('balanceDisplay');
            if (balanceEl) balanceEl.textContent = playerState.balance.toFixed(2);
            if (balanceDisplay) balanceDisplay.textContent = playerState.balance.toFixed(2);
        }
        
        function updateSelectedCount(count) {
            const countEl = document.getElementById('selectedCount');
            if (countEl) countEl.textContent = `${count}/2`;
        }
        
        function enableCartelaSelection(enable) {
            cartelaElements.forEach(cell => {
                if (enable) cell.classList.remove('disabled');
                else cell.classList.add('disabled');
            });
        }
        
        function showCartelaSelection(show) {
            const cartelaSection = document.getElementById('cartelaSection');
            const selectedSection = document.getElementById('selectedSection');
            if (cartelaSection) cartelaSection.style.display = show ? 'block' : 'none';
            if (selectedSection) selectedSection.style.display = show ? 'none' : 'block';
        }
        
        function showWinnerAnnouncement(data) {
            const overlay = document.createElement('div');
            overlay.className = 'winner-overlay';
            overlay.innerHTML = `
                <div class="winner-card">
                    <div class="winner-title">🎉 BINGO! 🎉</div>
                    <div class="winner-reward">💰 ${data.winnerReward.toFixed(2)} ETB</div>
                    <div class="winner-names">${data.message}</div>
                    <div class="next-round-info">⏳ Next round starting soon...</div>
                </div>
            `;
            document.body.appendChild(overlay);
            setTimeout(() => overlay.remove(), 5000);
        }
        
        function playSound(number) {
            const audio = new Audio(`/assets/sounds/${number}.mp3`);
            audio.play().catch(e => console.log('Audio error:', e));
        }
        
        function playWinSound() {
            const audio = new Audio('/assets/sounds/win.mp3');
            audio.play().catch(e => console.log('Win sound error:', e));
        }
        
        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        window.deselectCartela = deselectCartela;
    </script>
</body>
</html>
