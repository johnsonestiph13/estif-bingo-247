<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Estif Bingo - 24/7 Play</title>
    <link rel="icon" type="image/png" href="/assets/images/logo.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a472a 0%, #0d2e1e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        /* Header */
        .header {
            background: rgba(15, 62, 42, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .logo {
            height: 50px;
        }
        
        .balance-card {
            text-align: center;
        }
        
        .balance-label {
            font-size: 12px;
            color: #aaa;
        }
        
        .balance-amount {
            font-size: 24px;
            font-weight: bold;
            color: #f5c542;
        }
        
        .balance-currency {
            font-size: 12px;
            margin-left: 4px;
        }
        
        /* Game Display */
        .game-display {
            background: rgba(15, 62, 42, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .round-badge {
            background: #f5c542;
            color: #1a472a;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 15px;
        }
        
        .timer {
            font-size: 48px;
            font-family: monospace;
            font-weight: bold;
            color: #f5c542;
            margin: 10px 0;
        }
        
        .timer.urgent {
            color: #ff4444;
            animation: pulse 0.5s infinite;
        }
        
        .status {
            padding: 8px 16px;
            border-radius: 30px;
            display: inline-block;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        
        .status.waiting { background: #ff9800; color: #1a472a; }
        .status.selection { background: #2196f3; color: white; }
        .status.active { background: #4caf50; color: white; }
        .status.ended { background: #9c27b0; color: white; }
        
        .called-numbers {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            max-height: 150px;
            overflow-y: auto;
            margin-top: 15px;
        }
        
        .called-ball {
            background: #f5c542;
            color: #1a472a;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            animation: popIn 0.3s ease-out;
        }
        
        /* Cartela Grid */
        .cartela-section {
            background: rgba(15, 62, 42, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
        }
        
        .section-title {
            text-align: center;
            margin-bottom: 15px;
        }
        
        .section-title h3 {
            color: #f5c542;
            margin-bottom: 5px;
        }
        
        .bet-info {
            font-size: 12px;
            color: #aaa;
        }
        
        .selection-stats {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
        }
        
        .cartela-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 8px;
            max-height: 400px;
            overflow-y: auto;
            padding: 5px;
        }
        
        .cartela-item {
            background: #2a5a3e;
            text-align: center;
            padding: 10px 5px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.2s;
        }
        
        .cartela-item:hover {
            transform: scale(1.05);
            background: #f5c542;
            color: #1a472a;
        }
        
        .cartela-item.selected {
            background: #f5c542;
            color: #1a472a;
            box-shadow: 0 0 0 2px #ff9800;
        }
        
        .cartela-item.disabled {
            opacity: 0.4;
            pointer-events: none;
        }
        
        /* Selected Cartelas */
        .selected-cartelas {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        
        .selected-card {
            background: #2a5a3e;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            min-width: 120px;
            position: relative;
        }
        
        .selected-number {
            font-size: 28px;
            font-weight: bold;
            color: #f5c542;
        }
        
        .remove-btn {
            position: absolute;
            top: -10px;
            right: -10px;
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            cursor: pointer;
            font-size: 14px;
        }
        
        /* Winner Announcement */
        .winner-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.3s;
        }
        
        .winner-card {
            background: linear-gradient(135deg, #f5c542, #ff9800);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            max-width: 90%;
            animation: slideUp 0.3s;
        }
        
        .winner-title {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        
        .winner-names {
            font-size: 18px;
            margin-bottom: 10px;
        }
        
        .winner-reward {
            font-size: 28px;
            font-weight: bold;
            margin: 15px 0;
        }
        
        .next-round-info {
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            border-radius: 30px;
            background: #333;
            color: white;
            z-index: 1000;
            animation: slideUp 0.3s;
        }
        
        .toast.success { background: #4caf50; }
        .toast.error { background: #f44336; }
        .toast.warning { background: #ff9800; }
        
        /* Footer */
        .footer {
            text-align: center;
            padding: 20px;
            font-size: 12px;
            color: #aaa;
        }
        
        /* Animations */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        
        @keyframes popIn {
            from {
                transform: scale(0);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        /* Responsive */
        @media (max-width: 600px) {
            .cartela-grid {
                grid-template-columns: repeat(6, 1fr);
                gap: 5px;
            }
            
            .cartela-item {
                font-size: 12px;
                padding: 8px 3px;
            }
            
            .timer {
                font-size: 36px;
            }
            
            .called-ball {
                width: 35px;
                height: 35px;
                font-size: 14px;
            }
            
            .winner-title {
                font-size: 24px;
            }
        }
        
        @media (max-width: 400px) {
            .cartela-grid {
                grid-template-columns: repeat(5, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <img src="/assets/images/logo.png" alt="Estif Bingo" class="logo">
            <div class="balance-card">
                <div class="balance-label">💰 BALANCE</div>
                <div class="balance-amount" id="balanceAmount">0</div>
                <span class="balance-currency">ETB</span>
            </div>
        </div>
        
        <!-- Game Display -->
        <div class="game-display">
            <div class="round-badge" id="roundDisplay">Round --</div>
            <div class="timer" id="timerDisplay">--:--</div>
            <div class="status" id="statusDisplay">Loading...</div>
            <div class="called-numbers" id="calledNumbers"></div>
        </div>
        
        <!-- Cartela Selection -->
        <div class="cartela-section" id="cartelaSection">
            <div class="section-title">
                <h3>🎲 SELECT YOUR CARTELAS</h3>
                <p class="bet-info">Max 2 cartelas | 10 ETB each</p>
            </div>
            <div class="selection-stats">
                <span>Selected: <strong id="selectedCount">0/2</strong></span>
                <span>Your Balance: <strong id="balanceDisplay">0</strong> ETB</span>
            </div>
            <div class="cartela-grid" id="cartelaGrid"></div>
        </div>
        
        <!-- Selected Cartelas (After game starts) -->
        <div class="cartela-section" id="selectedSection" style="display: none;">
            <div class="section-title">
                <h3>🎯 YOUR SELECTED CARTELAS</h3>
                <p class="bet-info">Waiting for your numbers to be called!</p>
            </div>
            <div class="selected-cartelas" id="selectedCartelasList"></div>
        </div>
        
        <!-- Footer -->
        <div class="footer">
            <p>Estif Bingo © 2024 | 24/7 Continuous Gameplay</p>
        </div>
    </div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script>
        // Configuration
        const SOCKET_URL = window.location.origin;
        const token = localStorage.getItem('token');
        let userId = null;
        let socket = null;
        
        // Game state
        let currentGameState = {
            status: 'waiting',
            round: 0,
            timeLeft: 0,
            drawnNumbers: []
        };
        
        let playerState = {
            balance: 0,
            selectedCartelas: [],
            username: ''
        };
        
        let cartelaElements = [];
        
        // Audio
        const audioMap = {};
        for (let i = 1; i <= 75; i++) {
            const audio = new Audio(`/assets/sounds/${i}.mp3`);
            audio.preload = 'auto';
            audioMap[i] = audio;
        }
        const winSound = new Audio('/assets/sounds/win.mp3');
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            initializeSocket();
            createCartelaGrid();
        });
        
        // Check authentication
        function checkAuth() {
            if (!token) {
                window.location.href = '/login.html';
                return;
            }
            
            // Get user info from token (decode or from storage)
            const tokenData = JSON.parse(atob(token.split('.')[1]));
            userId = tokenData.userId;
        }
        
        // Initialize socket
        function initializeSocket() {
            socket = io(SOCKET_URL);
            
            socket.on('connect', () => {
                console.log('Connected to server');
                socket.emit('register', { userId, token });
            });
            
            socket.on('registered', (data) => {
                console.log('Registered:', data);
                playerState.balance = data.balance;
                playerState.username = data.username;
                updateBalanceDisplay();
                
                // Update game state
                currentGameState.round = data.currentRound;
                currentGameState.status = data.gameStatus;
                updateTimerDisplay(data.timeLeft);
                updateStatusDisplay();
            });
            
            socket.on('currentGameState', (state) => {
                currentGameState.status = state.status;
                currentGameState.round = state.round;
                currentGameState.drawnNumbers = state.drawnNumbers || [];
                updateTimerDisplay(state.timeLeft);
                updateStatusDisplay();
                updateCalledNumbers();
            });
            
            socket.on('gameStateUpdate', (state) => {
                currentGameState.status = state.status;
                currentGameState.round = state.round;
                currentGameState.drawnNumbers = state.drawnNumbers || [];
                updateStatusDisplay();
                updateCalledNumbers();
            });
            
            socket.on('selectionTimeLeft', (data) => {
                updateTimerDisplay(data.seconds);
                if (data.seconds <= 10) {
                    document.getElementById('timerDisplay').classList.add('urgent');
                } else {
                    document.getElementById('timerDisplay').classList.remove('urgent');
                }
            });
            
            socket.on('numberDrawn', (data) => {
                playSound(data.number);
                addCalledNumber(data.number);
                currentGameState.drawnNumbers.push(data.number);
            });
            
            socket.on('selectionConfirmed', (data) => {
                playerState.balance = data.remainingBalance;
                updateBalanceDisplay();
                updateSelectedCount(data.selectedCount);
                showToast(`Cartela ${data.cartela} selected!`, 'success');
                updateCartelaHighlight(data.cartela, true);
            });
            
            socket.on('selectionUpdated', (data) => {
                playerState.selectedCartelas = data.selectedCartelas;
                playerState.balance = data.balance;
                updateBalanceDisplay();
                updateSelectedDisplay();
                refreshCartelaHighlights();
            });
            
            socket.on('playerSelectionUpdate', (data) => {
                showToast(`${data.username} selected ${data.selectedCount} cartela(s)`, 'info');
            });
            
            socket.on('roundEnded', (data) => {
                showWinnerAnnouncement(data);
                playWinSound();
                playerState.selectedCartelas = [];
                updateSelectedDisplay();
                refreshCartelaHighlights();
            });
            
            socket.on('nextRoundCountdown', (data) => {
                showToast(`Next round starts in ${data.seconds} seconds!`, 'warning');
            });
            
            socket.on('error', (message) => {
                showToast(message, 'error');
            });
        }
        
        // Create cartela grid (1-400)
        function createCartelaGrid() {
            const grid = document.getElementById('cartelaGrid');
            grid.innerHTML = '';
            cartelaElements = [];
            
            for (let i = 1; i <= 400; i++) {
                const cell = document.createElement('div');
                cell.className = 'cartela-item';
                cell.textContent = i;
                cell.dataset.number = i;
                cell.onclick = () => selectCartela(i);
                grid.appendChild(cell);
                cartelaElements.push(cell);
            }
        }
        
        // Select cartela
        function selectCartela(number) {
            if (currentGameState.status !== 'selection') {
                showToast(`Cannot select now. Game status: ${currentGameState.status}`, 'error');
                return;
            }
            
            if (playerState.selectedCartelas.includes(number)) {
                socket.emit('deselectCartela', { cartelaNumber: number });
            } else {
                if (playerState.selectedCartelas.length >= 2) {
                    showToast('Maximum 2 cartelas allowed!', 'error');
                    return;
                }
                socket.emit('selectCartela', { cartelaNumber: number });
            }
        }
        
        // Update cartela highlight
        function updateCartelaHighlight(number, isSelected) {
            const cell = cartelaElements.find(c => parseInt(c.dataset.number) === number);
            if (cell) {
                if (isSelected) {
                    cell.classList.add('selected');
                } else {
                    cell.classList.remove('selected');
                }
            }
        }
        
        // Refresh all cartela highlights
        function refreshCartelaHighlights() {
            cartelaElements.forEach(cell => {
                const num = parseInt(cell.dataset.number);
                if (playerState.selectedCartelas.includes(num)) {
                    cell.classList.add('selected');
                } else {
                    cell.classList.remove('selected');
                }
            });
        }
        
        // Update selected display
        function updateSelectedDisplay() {
            const container = document.getElementById('selectedCartelasList');
            if (!container) return;
            
            if (playerState.selectedCartelas.length === 0) {
                container.innerHTML = '<div style="text-align:center; color:#aaa;">No cartelas selected</div>';
                return;
            }
            
            container.innerHTML = '';
            playerState.selectedCartelas.forEach(cartela => {
                const card = document.createElement('div');
                card.className = 'selected-card';
                card.innerHTML = `
                    <div class="selected-number">#${cartela}</div>
                    <button class="remove-btn" onclick="deselectCartela(${cartela})">✗</button>
                `;
                container.appendChild(card);
            });
        }
        
        // Deselect cartela
        function deselectCartela(number) {
            if (currentGameState.status !== 'selection') {
                showToast('Cannot deselect now', 'error');
                return;
            }
            socket.emit('deselectCartela', { cartelaNumber: number });
        }
        
        // Update timer display
        function updateTimerDisplay(seconds) {
            const timerEl = document.getElementById('timerDisplay');
            if (seconds === undefined || seconds === null) {
                timerEl.textContent = '--:--';
                return;
            }
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            timerEl.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }
        
        // Update status display
        function updateStatusDisplay() {
            const statusEl = document.getElementById('statusDisplay');
            const statusMap = {
                'waiting': '⏳ Waiting for next round',
                'selection': '🎲 SELECT CARTELAS',
                'active': '🎯 GAME IN PROGRESS',
                'ended': '🏆 ROUND ENDED'
            };
            statusEl.textContent = statusMap[currentGameState.status] || currentGameState.status;
            statusEl.className = `status ${currentGameState.status}`;
            
            // Show/hide sections
            const cartelaSection = document.getElementById('cartelaSection');
            const selectedSection = document.getElementById('selectedSection');
            
            if (currentGameState.status === 'selection') {
                cartelaSection.style.display = 'block';
                selectedSection.style.display = 'none';
                enableCartelaSelection(true);
            } else if (currentGameState.status === 'active') {
                cartelaSection.style.display = 'none';
                selectedSection.style.display = 'block';
                updateSelectedDisplay();
            } else {
                cartelaSection.style.display = 'block';
                selectedSection.style.display = 'none';
                enableCartelaSelection(false);
            }
            
            // Update round display
            document.getElementById('roundDisplay').textContent = `Round ${currentGameState.round}`;
        }
        
        // Enable/disable cartela selection
        function enableCartelaSelection(enable) {
            cartelaElements.forEach(cell => {
                if (enable) {
                    cell.classList.remove('disabled');
                } else {
                    cell.classList.add('disabled');
                }
            });
        }
        
        // Update called numbers
        function updateCalledNumbers() {
            const container = document.getElementById('calledNumbers');
            if (!container) return;
            
            container.innerHTML = '';
            currentGameState.drawnNumbers.forEach(number => {
                const ball = document.createElement('div');
                ball.className = 'called-ball';
                ball.textContent = number;
                container.appendChild(ball);
            });
        }
        
        // Add single called number
        function addCalledNumber(number) {
            const container = document.getElementById('calledNumbers');
            const ball = document.createElement('div');
            ball.className = 'called-ball';
            ball.textContent = number;
            container.appendChild(ball);
            container.scrollTop = container.scrollHeight;
        }
        
        // Update balance display
        function updateBalanceDisplay() {
            document.getElementById('balanceAmount').textContent = playerState.balance.toFixed(2);
            document.getElementById('balanceDisplay').textContent = playerState.balance.toFixed(2);
        }
        
        // Update selected count
        function updateSelectedCount(count) {
            document.getElementById('selectedCount').textContent = `${count}/2`;
        }
        
        // Show winner announcement
        function showWinnerAnnouncement(data) {
            const overlay = document.createElement('div');
            overlay.className = 'winner-overlay';
            overlay.innerHTML = `
                <div class="winner-card">
                    <div class="winner-title">🎉 BINGO! 🎉</div>
                    <div class="winner-names">🏆 ${data.winnerNames || 'No winners'}</div>
                    <div class="winner-reward">💰 ${data.winnerReward.toFixed(2)} ETB each</div>
                    <div class="next-round-info">⏳ Next round starts in ${data.nextRoundIn} seconds...</div>
                </div>
            `;
            document.body.appendChild(overlay);
            
            setTimeout(() => {
                overlay.remove();
            }, 5000);
        }
        
        // Play sound
        function playSound(number) {
            const audio = audioMap[number];
            if (audio) {
                audio.currentTime = 0;
                audio.play().catch(e => console.log('Audio error:', e));
            }
        }
        
        // Play win sound
        function playWinSound() {
            winSound.currentTime = 0;
            winSound.play().catch(e => console.log('Win sound error:', e));
        }
        
        // Show toast
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }
        
        // Get player status periodically
        setInterval(() => {
            if (socket) {
                socket.emit('getStatus');
            }
        }, 5000);
        
        // Expose for inline onclick
        window.deselectCartela = deselectCartela;
    </script>
</body>
</html>
