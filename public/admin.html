<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estif Bingo - Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a472a 0%, #0d2e1e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            color: #f5efdc;
        }
        
        /* Login Container */
        .login-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #1a472a 0%, #0d2e1e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: all 0.3s;
        }
        
        .login-container.hidden {
            display: none;
        }
        
        .login-card {
            background: rgba(15, 62, 42, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        
        .logo {
            font-size: 48px;
            margin-bottom: 10px;
        }
        
        .login-card h1 {
            color: #f5c542;
            margin-bottom: 10px;
        }
        
        .login-card p {
            opacity: 0.7;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .login-card input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            background: #2a5a3e;
            color: white;
            font-size: 16px;
        }
        
        .login-card input::placeholder {
            color: #aaa;
        }
        
        .login-card button {
            width: 100%;
            padding: 12px;
            background: #f5c542;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .login-card button:hover {
            background: #e0b12e;
        }
        
        .error-message {
            color: #ff8888;
            margin-top: 15px;
            font-size: 14px;
        }
        
        /* Dashboard Container */
        .dashboard-container {
            display: none;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .dashboard-container.active {
            display: block;
        }
        
        /* Dashboard Header */
        .dashboard-header {
            background: rgba(15, 62, 42, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .dashboard-header h1 {
            color: #f5c542;
            font-size: 24px;
        }
        
        .logout-btn {
            background: #f44336;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .logout-btn:hover {
            background: #d32f2f;
        }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: rgba(15, 62, 42, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #f5c542;
        }
        
        .stat-label {
            font-size: 14px;
            opacity: 0.8;
            margin-top: 5px;
        }
        
        /* Control Card */
        .control-card {
            background: rgba(15, 62, 42, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        
        .control-card h3 {
            margin-bottom: 15px;
            color: #f5c542;
        }
        
        .btn-primary {
            background: #f5c542;
            color: #1a472a;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            margin-right: 10px;
        }
        
        .btn-primary:hover {
            background: #e0b12e;
        }
        
        .btn-secondary {
            background: #2a5a3e;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            margin-right: 10px;
        }
        
        .btn-secondary:hover {
            background: #3a6a4e;
        }
        
        /* Players Table */
        .players-table {
            background: rgba(15, 62, 42, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            overflow-x: auto;
        }
        
        .players-table h3 {
            margin-bottom: 15px;
            color: #f5c542;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        th {
            background: rgba(0,0,0,0.3);
            font-weight: bold;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .status-badge.selection { background: #2196f3; }
        .status-badge.active { background: #4caf50; }
        .status-badge.ended { background: #9c27b0; }
        
        .called-numbers {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        
        .called-ball {
            background: #f5c542;
            color: #1a472a;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .dashboard-header {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <!-- Login Container -->
    <div id="loginContainer" class="login-container">
        <div class="login-card">
            <div class="logo">🎲</div>
            <h1>Estif Bingo Admin</h1>
            <p>Enter password to access dashboard</p>
            <input type="password" id="adminPassword" placeholder="Admin Password" autofocus>
            <button onclick="login()">Login</button>
            <div id="loginError" class="error-message"></div>
        </div>
    </div>
    
    <!-- Dashboard Container -->
    <div id="dashboardContainer" class="dashboard-container">
        <div class="dashboard-header">
            <h1>🎲 Estif Bingo - Admin Dashboard</h1>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="gameStatus">---</div>
                <div class="stat-label">Game Status</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="roundNumber">0</div>
                <div class="stat-label">Current Round</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="playersCount">0</div>
                <div class="stat-label">Players Online</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="timerDisplay">00:00</div>
                <div class="stat-label">Timer</div>
            </div>
        </div>
        
        <div class="control-card">
            <h3>🎮 Game Controls</h3>
            <button class="btn-primary" onclick="forceStartGame()">🎯 Force Start Game</button>
            <button class="btn-secondary" onclick="refreshData()">🔄 Refresh</button>
        </div>
        
        <div class="control-card">
            <h3>🔢 Drawn Numbers</h3>
            <div id="drawnNumbers" class="called-numbers">No numbers drawn yet</div>
        </div>
        
        <div class="players-table">
            <h3>👥 Players Online</h3>
            <table id="playersTable">
                <thead>
                    <tr>
                        <th>Player</th>
                        <th>Balance (ETB)</th>
                        <th>Selected Cartelas</th>
                    </tr>
                </thead>
                <tbody id="playersTableBody">
                    <tr><td colspan="3">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script>
        let socket = null;
        let isLoggedIn = false;
        
        // Admin password - CHANGE THIS TO YOUR PASSWORD
        const ADMIN_PASSWORD = "admin123";
        
        // Check if already logged in (session storage)
        if (sessionStorage.getItem('adminLoggedIn') === 'true') {
            document.getElementById('loginContainer').classList.add('hidden');
            document.getElementById('dashboardContainer').classList.add('active');
            isLoggedIn = true;
            initializeSocket();
            refreshData();
            startAutoRefresh();
        }
        
        function login() {
            const password = document.getElementById('adminPassword').value;
            const errorDiv = document.getElementById('loginError');
            
            if (password === ADMIN_PASSWORD) {
                sessionStorage.setItem('adminLoggedIn', 'true');
                document.getElementById('loginContainer').classList.add('hidden');
                document.getElementById('dashboardContainer').classList.add('active');
                isLoggedIn = true;
                errorDiv.textContent = '';
                initializeSocket();
                refreshData();
                startAutoRefresh();
            } else {
                errorDiv.textContent = 'Invalid password!';
                document.getElementById('adminPassword').value = '';
                document.getElementById('adminPassword').focus();
            }
        }
        
        function logout() {
            sessionStorage.removeItem('adminLoggedIn');
            isLoggedIn = false;
            document.getElementById('loginContainer').classList.remove('hidden');
            document.getElementById('dashboardContainer').classList.remove('active');
            if (socket) {
                socket.disconnect();
                socket = null;
            }
        }
        
        function initializeSocket() {
            if (!isLoggedIn) return;
            
            socket = io();
            
            socket.on('connect', () => {
                console.log('Admin socket connected');
            });
            
            socket.on('gameState', (state) => {
                updateDashboard(state);
            });
            
            socket.on('timerUpdate', (data) => {
                const mins = Math.floor(data.seconds / 60);
                const secs = data.seconds % 60;
                document.getElementById('timerDisplay').textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            });
            
            socket.on('playersUpdate', (data) => {
                document.getElementById('playersCount').textContent = data.count;
                updatePlayersTable(data.players);
            });
            
            socket.on('numberDrawn', (data) => {
                updateDrawnNumbersDisplay();
            });
            
            socket.on('roundEnded', (data) => {
                refreshData();
            });
        }
        
        async function forceStartGame() {
            try {
                const response = await fetch('/api/admin/start-game', { method: 'POST' });
                const data = await response.json();
                alert(data.message);
                refreshData();
            } catch (err) {
                alert('Error: ' + err.message);
            }
        }
        
        async function refreshData() {
            try {
                const response = await fetch('/api/admin/stats');
                const data = await response.json();
                updateDashboard(data);
                updateDrawnNumbersDisplay(data.drawnNumbers);
            } catch (err) {
                console.error('Error fetching stats:', err);
            }
        }
        
        function updateDashboard(data) {
            const statusMap = {
                'selection': '🎲 SELECTION',
                'active': '🎯 ACTIVE',
                'ended': '🏆 ENDED'
            };
            document.getElementById('gameStatus').innerHTML = `<span class="status-badge ${data.status}">${statusMap[data.status] || data.status.toUpperCase()}</span>`;
            document.getElementById('roundNumber').textContent = data.round || 0;
            document.getElementById('playersCount').textContent = data.playersCount || 0;
            
            if (data.timer !== undefined) {
                const mins = Math.floor(data.timer / 60);
                const secs = data.timer % 60;
                document.getElementById('timerDisplay').textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }
        }
        
        function updateDrawnNumbersDisplay(drawnNumbers) {
            const container = document.getElementById('drawnNumbers');
            if (!container) return;
            
            if (!drawnNumbers || drawnNumbers.length === 0) {
                container.innerHTML = 'No numbers drawn yet';
                return;
            }
            
            container.innerHTML = '';
            drawnNumbers.slice(-20).forEach(number => {
                const ball = document.createElement('span');
                ball.className = 'called-ball';
                ball.textContent = number;
                container.appendChild(ball);
            });
        }
        
        function updatePlayersTable(players) {
            const tbody = document.getElementById('playersTableBody');
            if (!tbody) return;
            
            if (!players || players.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3">No players online</td></tr>';
                return;
            }
            
            tbody.innerHTML = '';
            players.forEach(player => {
                const row = tbody.insertRow();
                row.insertCell(0).textContent = player.username || 'Anonymous';
                row.insertCell(1).textContent = (player.balance || 0).toFixed(2) + ' ETB';
                row.insertCell(2).textContent = (player.selectedCount || 0) + ' / 2';
            });
        }
        
        function startAutoRefresh() {
            setInterval(() => {
                if (isLoggedIn) refreshData();
            }, 5000);
        }
        
        // Enter key support
        document.getElementById('adminPassword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
