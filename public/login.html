<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estif Bingo - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a472a 0%, #0d2e1e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container {
            background: rgba(15, 62, 42, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo img {
            width: 80px;
            margin-bottom: 10px;
        }
        
        .logo h1 {
            color: #f5c542;
            font-size: 28px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #f5efdc;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: none;
            border-radius: 10px;
            background: #2a5a3e;
            color: white;
            font-size: 16px;
        }
        
        .form-group input::placeholder {
            color: #aaa;
        }
        
        .login-btn {
            width: 100%;
            padding: 12px;
            background: #f5c542;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
        }
        
        .error-message {
            color: #ff8888;
            text-align: center;
            margin-top: 15px;
        }
        
        .admin-link {
            text-align: center;
            margin-top: 20px;
        }
        
        .admin-link a {
            color: #f5c542;
            text-decoration: none;
        }
        
        .info-text {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <img src="/assets/images/logo.png" alt="Estif Bingo">
            <h1>Estif Bingo</h1>
            <p style="color: #aaa; font-size: 12px;">24/7 Continuous Gameplay</p>
        </div>
        
        <div class="form-group">
            <label>Email or Username</label>
            <input type="text" id="username" placeholder="Enter your email or username">
        </div>
        
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter your password">
        </div>
        
        <button class="login-btn" onclick="login()">Login</button>
        
        <div id="errorMessage" class="error-message"></div>
        
        <div class="admin-link">
            <a href="#" onclick="showAdminLogin()">Admin Login</a>
        </div>
        
        <div class="info-text">
            <p>🎲 New round every ~60 seconds</p>
            <p>💰 Win up to 80% of the pool</p>
        </div>
    </div>

    <script>
        async function login(isAdmin = false) {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            
            if (!username || !password) {
                errorDiv.textContent = 'Please enter username and password';
                return;
            }
            
            try {
                const endpoint = isAdmin ? '/api/auth/admin-login' : '/api/auth/login';
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: username, password })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    localStorage.setItem('token', data.token);
                    
                    if (isAdmin || data.user?.role === 'admin') {
                        window.location.href = '/admin.html';
                    } else {
                        window.location.href = '/player.html';
                    }
                } else {
                    errorDiv.textContent = data.message || 'Invalid credentials';
                }
            } catch (error) {
                errorDiv.textContent = 'Connection error. Please try again.';
            }
        }
        
        function showAdminLogin() {
            document.querySelector('.login-container h1').textContent = 'Admin Login';
            document.querySelector('.login-btn').onclick = () => login(true);
            document.querySelector('.admin-link').style.display = 'none';
        }
        
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
