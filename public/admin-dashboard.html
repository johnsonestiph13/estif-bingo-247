<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estif Bingo - Admin Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a472a 0%, #0d2e1e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-container {
            background: rgba(15, 62, 42, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        
        .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        h1 {
            color: #f5c542;
            margin-bottom: 30px;
        }
        
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            background: #2a5a3e;
            color: white;
            font-size: 16px;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: #f5c542;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .error {
            color: #ff8888;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">🎲</div>
        <h1>Estif Bingo Admin</h1>
        <input type="password" id="password" placeholder="Enter Admin Password" autofocus>
        <button onclick="login()">Login</button>
        <div id="error" class="error"></div>
    </div>
    
    <script>
        function login() {
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error');
            
            // Simple password check - CHANGE THIS TO YOUR PASSWORD
            if (password === 'admin123') {
                window.location.href = '/admin-dashboard.html';
            } else {
                errorDiv.textContent = 'Invalid password!';
            }
        }
        
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
